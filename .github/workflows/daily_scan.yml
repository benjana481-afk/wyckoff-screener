name: Daily LPS Scan

on:
  schedule:
    # 22:00 UTC = 01:00 ישראל (UTC+3) — א'-ו' לפנות בוקר (כולל שישי בלילה)
    - cron: "0 22 * * 0-5"
  workflow_dispatch:   # מאפשר הפעלה ידנית מ-GitHub

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LPS scan & notify Telegram
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python daily_scan.py
